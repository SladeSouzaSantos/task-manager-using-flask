version: '3.8'

services:
  web:
    build: .
    container_name: task_manager_flask
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    # Carrega todas as variáveis (incluindo as da infra) a partir do .env na raiz
    env_file:
      - ./.env
    # A aplicação usa SQLite por padrão; não há dependência de banco externo.
    networks:
      - tasknet
    restart: unless-stopped

networks:
  # Rede externa compartilhada entre o compose da aplicação e o compose da infra
  tasknet:
    external: true
