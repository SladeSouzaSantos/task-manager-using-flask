name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: write
  issues: write

jobs:
  # ---------------------------------------------------------------------
  # Lint de mensagens de commit (Conventional Commits)
  # ---------------------------------------------------------------------
  lint_commit:
    name: Lint Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node (commitlint)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install commitlint
        run: |
          npm install --no-save @commitlint/cli @commitlint/config-conventional

      - name: Lint last commit message
        run: |
          npx commitlint --from=HEAD~1 --to=HEAD || {
            echo -e "\nCommit message does not follow Conventional Commits format."
            exit 1
          }

  # ---------------------------------------------------------------------
  # Infraestrutura de observabilidade (Prometheus, Grafana, Loki, Alertmanager)
  # ---------------------------------------------------------------------
  infra:
    name: Infraestrutura de Observabilidade
    needs: lint_commit
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Create Docker network tasknet
        run: |
          docker network create tasknet || true

      - name: Set up Docker Compose and start infra
        run: |
          docker compose -f infra/docker-compose-infra.yml up -d
          # aguarda os serviços ficarem saudáveis
          sleep 20

      - name: Wait for infra containers to be healthy
        run: |
          echo "Verificando healthchecks dos containers..."
          max_attempts=30
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            # Lista containers do compose e verifica status de health
            unhealthy=$(docker compose -f infra/docker-compose-infra.yml ps -q |
              xargs docker inspect -f '{{.Name}} {{.State.Health.Status}}' |
              grep -v "healthy" || true)
            if [ -z "$unhealthy" ]; then
              echo "✅ Todos os containers estão healthy."
              exit 0
            fi
            echo "⏳ Tentativa $attempt/$max_attempts – containers não saudáveis ainda:"
            echo "$unhealthy"
            attempt=$((attempt + 1))
            sleep 5
          done
          echo "❌ Alguns containers não ficaram healthy a tempo."
          exit 1

      - name: List running containers (debug)
        run: docker ps -a

      # -------------------------------------------------
      # 1️⃣ Healthchecks básicos de cada serviço
      # -------------------------------------------------
      - name: Healthcheck Prometheus
        run: |
          echo "Verificando health endpoint do Prometheus..."
          curl -fsSL http://prometheus:9090/-/healthy

      - name: Healthcheck Grafana
        run: |
          echo "Verificando health endpoint do Grafana..."
          curl -fsSL http://grafana:3000/api/health

      - name: Healthcheck Loki
        run: |
          echo "Verificando ready endpoint do Loki..."
          curl -fsSL http://loki:3100/ready

      - name: Healthcheck Alertmanager
        run: |
          echo "Verificando status do Alertmanager..."
          curl -fsSL http://alertmanager:9093/api/v2/status

      # -------------------------------------------------
      # 2️⃣ Verificar integração Prometheus ↔ Alertmanager
      # -------------------------------------------------
      - name: Verify Prometheus sees Alertmanager
        run: |
          echo "Consultando Prometheus para listar Alertmanagers..."
          curl -s http://prometheus:9090/api/v1/alertmanagers | jq .

      # -------------------------------------------------
      # 3️⃣ Verificar datasources do Grafana (Prometheus & Loki)
      # -------------------------------------------------
      - name: Get Grafana admin token
        id: grafana_token
        run: |
          # Usuário e senha padrão (admin/admin) – ajuste se houver customização
          token=$(curl -s -X POST http://grafana:3000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"user":"admin","password":"admin"}' | jq -r .key)
          echo "token=$token" >> $GITHUB_OUTPUT

      - name: Verify Grafana datasource Prometheus
        run: |
          echo "Listando datasource Prometheus no Grafana..."
          curl -s -H "Authorization: Bearer ${{ steps.grafana_token.outputs.token }}" \
            http://grafana:3000/api/datasources | \
            jq '.[] | select(.type=="prometheus")'

      - name: Verify Grafana datasource Loki
        run: |
          echo "Listando datasource Loki no Grafana..."
          curl -s -H "Authorization: Bearer ${{ steps.grafana_token.outputs.token }}" \
            http://grafana:3000/api/datasources | \
            jq '.[] | select(.type=="loki")'

      # -------------------------------------------------
      # 4️⃣ Verificar Promtail → Loki (log de teste)
      # -------------------------------------------------
      - name: Emit test log for Promtail
        run: |
          # Cria um arquivo de log que o Promtail está configurado para monitorar.
          # O caminho abaixo assume que o volume /var/log/promtail está mapeado.
          LOG_DIR=$(docker inspect -f '{{range .Mounts}}{{if eq .Destination "/var/log/promtail"}}{{.Source}}{{end}}{{end}}' promtail)
          if [ -z "$LOG_DIR" ]; then
            echo "Diretório de logs do Promtail não encontrado – pulando teste de log."
          else
            echo "test-log-from-promtail-$(date +%s)" >> "$LOG_DIR/test.log"
          fi

      - name: Query Loki for test log
        run: |
          echo "Consultando Loki para verificar se o log de teste chegou..."
          # Aguarda alguns segundos para o Promtail enviar o log
          sleep 5
          curl -s "http://loki:3100/loki/api/v1/query_range?query=%22test-log-from-promtail%22&limit=5&direction=BACKWARD" | jq .

  # ---------------------------------------------------------------------
  # Testes (Pytest)
  # ---------------------------------------------------------------------
  test:
    name: Tests (Pytest)
    needs: lint_commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies and pytest
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run pytest
        run: |
          echo "Running pytest..."
          pytest -q

  # ---------------------------------------------------------------------
  # Bandit security scan
  # ---------------------------------------------------------------------
  bandit:
    name: Bandit Security Scan
    needs: lint_commit
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Perform Bandit Analysis
        uses: PyCQA/bandit-action@v1
        with:
          exit_zero: true

  # ---------------------------------------------------------------------
  # OWASP Dependency-Check
  # ---------------------------------------------------------------------
  dependency_check:
    name: OWASP Dependency-Check
    needs: lint_commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache NVD Vulnerability Database
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/odc-data
          key: ${{ runner.os }}-odc-data-v2
          restore-keys: |
            ${{ runner.os }}-odc-data-v2
          save-always: true 

      - name: Run OWASP Dependency-Check (Docker)
        env:
            NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          # 1. Cria a pasta de dados e a nova pasta de relatórios
          mkdir -p ${{ github.workspace }}/odc-data
          mkdir -p ${{ github.workspace }}/odc-reports
          
          # 2. Dá permissão total para o Docker conseguir escrever dentro delas
          chmod -R 777 ${{ github.workspace }}/odc-data
          chmod -R 777 ${{ github.workspace }}/odc-reports
          
          rm -f ${{ github.workspace }}/odc-data/*.lock
          rm -f ${{ github.workspace }}/odc-data/*.lck
          
          docker pull owasp/dependency-check:latest
          
          # 3. Mapeia a pasta de relatórios e aponta o --out para ela
          docker run --rm \
            -e JAVA_OPTS="-Xmx4096m" \
            -v "${{ github.workspace }}:/src" \
            -v "${{ github.workspace }}/odc-data:/usr/share/dependency-check/data" \
            -v "${{ github.workspace }}/odc-reports:/reports" \
            owasp/dependency-check:latest \
            --project "task-manager-using-flask" \
            --scan "/src" \
            --format "HTML" \
            --out "/reports/dependency-check-report.html" \
            --nvdApiKey "${NVD_API_KEY}" \
            --failOnCVSS 7

      - name: Upload Dependency-Check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: odc-reports/dependency-check-report.html

  # ---------------------------------------------------------------------
  # Build and push Docker image
  # ---------------------------------------------------------------------
  build_image:
    name: Build and Push Docker Image
    needs: [test, bandit, dependency_check]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set lowercase repository name
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Set version variable
        id: version
        run: |
          echo "VERSION=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ env.REPO }}:latest

  # ---------------------------------------------------------------------
  # ZAP – Dynamic Application Security Testing
  # ---------------------------------------------------------------------
  zap_scan:
    name: ZAP Dynamic Security Testing
    needs: build_image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Variables and Login
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Start application container for ZAP scan
        run: |
          docker run -d --name zap_target --network=host \
          -e DATABASE_URL="sqlite:////tmp/site.db" \
          --user $(id -u):$(id -g) \
          ghcr.io/${{ env.REPO }}:latest

      - name: Wait for application to be ready
        run: |
          echo "Aguardando o Flask iniciar na porta 5000..."
          for i in {1..20}; do
            if curl -s http://localhost:5000 > /dev/null; then
              echo "🚀 Flask está online e respondendo perfeitamente!"
              exit 0
            fi
            echo "Tentativa $i/20: Aplicativo ainda não respondeu..."
            sleep 2
          done
          echo "❌ ERRO: O Flask não ficou pronto a tempo."
          echo "================ LOGS DO CONTAINER VALIDADOR ================"
          docker logs zap_target
          echo "============================================================="
          exit 1

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: http://localhost:5000
          fail_action: false

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-report.html

      - name: Stop application container
        if: always()
        run: |
          docker rm -f zap_target

  # ---------------------------------------------------------------------
  # Deploy-review
  # ---------------------------------------------------------------------
  deploy_review:
    name: Deploy-Review
    needs: [build_image, infra]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Variables and Login
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Create Docker network tasknet
        run: docker network create tasknet || true

      - name: Deploy review environment (Flask)
        run: |
          docker run -d \
            --name task_manager_flask \
            --network tasknet \
            -p 8080:5000 \
            ghcr.io/${{ env.REPO }}:latest

      # -------------------------------------------------
      # 1️⃣ Verifica se a aplicação está up
      # -------------------------------------------------
      - name: Check Flask health endpoint
        run: |
          echo "Aguardando health endpoint..."
          for i in {1..15}; do
            if curl -s http://task_manager_flask:5000/health | grep -i "ok"; then
              echo "✅ Flask health OK"
              break
            fi
            echo "Tentativa $i/15 – ainda não respondeu"
            sleep 2
          done

      # -------------------------------------------------
      # 2️⃣ Verifica /metrics
      # -------------------------------------------------
      - name: Check /metrics endpoint
        run: |
          curl -s http://task_manager_flask:5000/metrics | head -n 5

      # -------------------------------------------------
      # 3️⃣ Consulta Prometheus para ver se o target está up
      # -------------------------------------------------
      - name: Verify Prometheus can scrape Flask
        run: |
          echo "Consultando Prometheus /api/v1/targets ..."
          curl -s http://prometheus:9090/api/v1/targets | \
            jq '.data.activeTargets[] | select(.labels.job=="task_manager_flask")'

      # -------------------------------------------------
      # 4️⃣ (Opcional) Query simples da métrica `up`
      # -------------------------------------------------
      - name: Query Prometheus `up` metric
        run: |
          curl -s "http://prometheus:9090/api/v1/query?query=up{job=\"task_manager_flask\"}" | jq .

      - name: Environment Details
        run: |
          echo "Ambiente de review disponível na porta 8080 do runner."
          echo "Aguardando verificações..."

      - name: Stop review environment container
        if: always()
        run: |
          docker rm -f task_manager_flask

  # -----------------------------------------------------------------
  # Job de Finalização
  # -----------------------------------------------------------------
  final_cleanup:
    name: Final Cleanup
    needs: [zap_scan, deploy_review]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout (necessário só para ter acesso ao repo)
        uses: actions/checkout@v4
      - name: Remove containers da infra (caso ainda existam)
        run: |
          docker ps -a --filter "name=task_manager_flask" -q | xargs -r docker rm -f
          docker ps -a --filter "name=zap_target" -q | xargs -r docker rm -f
      - name: Down infra (remove volumes, rede etc.)
        run: |
          docker compose -f infra/docker-compose-infra.yml down -v || true
          docker network rm tasknet || true
      - name: Mensagem final
        run: echo "✅ Pipeline finalizado – limpeza concluída."