name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# CONCEDE PERMISSÃO GLOBAL PARA GRAVAR NO GHCR E LER O CÓDIGO
permissions:
  contents: read
  packages: write

jobs:
  # ---------------------------------------------------------------------
  # 0️⃣ Lint de mensagens de commit (Conventional Commits)
  # ---------------------------------------------------------------------
  lint_commit:
    name: Lint Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node (commitlint)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install commitlint
        run: |
          npm install --no-save @commitlint/cli @commitlint/config-conventional

      - name: Lint last commit message
        run: |
          npx commitlint --from=HEAD~1 --to=HEAD || {
            echo -e "\nCommit message does not follow Conventional Commits format."
            exit 1
          }

  # ---------------------------------------------------------------------
  # Testes (placeholder)
  # ---------------------------------------------------------------------
  test:
    name: Tests (Placeholder)
    needs: lint_commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
            echo "No tests defined. Skipping."

  # ---------------------------------------------------------------------
  # SonarCloud Scan
  # ---------------------------------------------------------------------
  #sonarqube:
  #  name: SonarQube/SonarCloud Scan
  #  needs: test
  #  runs-on: ubuntu-latest
  #  steps:
  #    - name: Checkout repository
  #      uses: actions/checkout@v4
  #      with:
  #        fetch-depth: 0

  #    - name: SonarCloud Scan
  #      uses: SonarSource/sonarcloud-github-action@master
  #      env:
  #        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  #        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ---------------------------------------------------------------------
  # Bandit security scan
  # ---------------------------------------------------------------------
  bandit:
    name: Bandit Security Scan
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bandit
        run: |
          pip install bandit

      - name: Run Bandit security scan
        run: |
          bandit -r . -ll

  # ---------------------------------------------------------------------
  # 3️⃣ OWASP Dependency-Check
  # ---------------------------------------------------------------------
  dependency_check:
    name: OWASP Dependency-Check
    needs: bandit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # NOVO: Cache do banco de dados do NVD para não baixar tudo do zero sempre
      - name: Cache NVD Vulnerability Database
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/odc-data
          key: ${{ runner.os }}-odc-data
          restore-keys: |
            ${{ runner.os }}-odc-data

      - name: Run OWASP Dependency-Check (Docker)
        env:
            NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          # Cria a pasta física onde o banco de dados em cache vai ficar
          mkdir -p ${{ github.workspace }}/odc-data
          
          docker pull owasp/dependency-check:latest
          
          # NOVO: Adicionado JAVA_OPTS de 4GB de RAM e mapeamento de volume (-v) para os dados do NVD
          docker run --rm \
            -e NVD_API_KEY="${NVD_API_KEY}" \
            -e JAVA_OPTS="-Xmx4096m" \
            -v "${{ github.workspace }}:/src" \
            -v "${{ github.workspace }}/odc-data:/usr/share/dependency-check/data" \
            owasp/dependency-check:latest \
            --project "task-manager-using-flask" \
            --scan "/src" \
            --format "HTML" \
            --out "/src/dependency-check-report.html" \
            --failOnCVSS 7

      - name: Upload Dependency-Check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: dependency-check-report.html

  # ---------------------------------------------------------------------
  # 4️⃣ Build and push Docker image
  # ---------------------------------------------------------------------
  build_image:
    name: Build and push Docker Image
    needs: dependency_check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # CORREÇÃO: Transforma dono/repositório em minúsculas para o Docker não quebrar
      - name: Set lowercase repository name
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Set version variable
        id: version
        run: |
          echo "VERSION=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image to GHCR
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO }}:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ env.REPO }}:latest

  # ---------------------------------------------------------------------
  # 5️⃣ ZAP – Dynamic Application Security Testing
  # ---------------------------------------------------------------------
  zap_scan:
    name: ZAP Dynamic Security Testing
    needs: build_image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # CORREÇÃO: Variável minúscula e Login no novo Job
      - name: Prepare Variables and Login
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Start application container for ZAP scan
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          docker run -d --name zap_target -p 5000:5000 ghcr.io/${{ env.REPO }}:latest

      - name: Wait for application to be ready
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          # Aguarda o serviço responder HTTP 200/302 na porta 5000
          for i in {1..30}; do
            curl -s http://localhost:5000 > /dev/null && break || sleep 2
          done

      # CORREÇÃO: Usando IP interno do Docker (172.17.0.1) em vez de localhost
      - name: Run OWASP ZAP baseline scan
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: zaproxy/action-baseline@v0.14.0 # Atualizado para versão mais recente
        with:
          target: http://172.17.0.1:5000
          fail_action: false

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-report.html

      - name: Stop application container
        if: always()
        run: |
          docker rm -f zap_target

  # ---------------------------------------------------------------------
  # 6️⃣ Deploy-review
  # ---------------------------------------------------------------------
  deploy_review:
    name: Deploy-Review
    needs: zap_scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # CORREÇÃO: Variável minúscula e Login no novo Job
      - name: Prepare Variables and Login
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Deploy review environment
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          docker run -d --name review_app -p 8080:5000 ghcr.io/${{ env.REPO }}:latest

      # CORREÇÃO: Removido o auto-approve bot. Apenas simula a espera do ambiente de stage.
      - name: Environment Details
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          echo "Ambiente de review disponível na porta 8080 do runner."
          echo "Aguardando verificações..."

      - name: Stop review environment container
        if: always()
        run: |
            docker rm -f review_app