name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# ---------------------------------------------------------------------------
#  Pipeline reorganizado em jobs separados para melhorar a visibilidade
#  Ordem desejada: Build → Lint → Bandit → Dependency‑Check → Docker Build → ZAP → Deploy‑review
# ---------------------------------------------------------------------------

jobs:
  # ---------------------------------------------------------------------
  # 0️⃣ Lint de mensagens de commit (Conventional Commits)
  # ---------------------------------------------------------------------
  lint_commit:
    name: Lint Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node (commitlint)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install commitlint
        run: |
          npm install --no-save @commitlint/cli @commitlint/config-conventional

      - name: Lint last commit message
        run: |
          npx commitlint --from=HEAD~1 --to=HEAD || {
            echo "\nCommit message does not follow Conventional Commits format."
            exit 1
          }

  # ---------------------------------------------------------------------
  # 1️⃣ Testes (placeholder) – depende do lint de commit
  # ---------------------------------------------------------------------
  test:
    name: Tests (Placeholder)
    needs: lint_commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          # Add your test command here, e.g., pytest
          echo "No tests defined. Skipping."

  # ---------------------------------------------------------------------
  # 2️⃣ Bandit security scan – depende dos testes
  # ---------------------------------------------------------------------
  bandit:
    name: Bandit Security Scan
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bandit
        run: |
          pip install bandit

      - name: Run Bandit security scan
        run: |
          bandit -r . -ll

  # ---------------------------------------------------------------------
  # 3️⃣ OWASP Dependency‑Check – depende do Bandit
  # ---------------------------------------------------------------------
  dependency_check:
    name: OWASP Dependency‑Check
    needs: bandit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run OWASP Dependency‑Check (Docker)
        env:
          # Optional: provide an NVD API key to avoid rate‑limit issues.
          # Create a repository secret named NVD_API_KEY with your key.
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          docker pull owasp/dependency-check:latest
          docker run --rm \
            -e NVD_API_KEY=${{ secrets.NVD_API_KEY }} \
            -v "${{ github.workspace }}:/src" \
            owasp/dependency-check:latest \
            --project "task-manager-using-flask" \
            --scan "/src" \
            --format "HTML" \
            --out "/src/dependency-check-report.html" \
            --failOnCVSS 7 \
            --disableNvd

      - name: Upload Dependency‑Check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: dependency-check-report.html

  # ---------------------------------------------------------------------
  # 4️⃣ Build and push Docker image – depende do Dependency‑Check
  # ---------------------------------------------------------------------
  build_image:
    name: Build and push Docker Image
    needs: dependency_check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version variable
        id: version
        run: |
          echo "VERSION=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image to GHCR
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/task-manager-using-flask:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/task-manager-using-flask:latest

  # ---------------------------------------------------------------------
  # 5️⃣ ZAP – Dynamic Application Security Testing – depende da imagem Docker
  # ---------------------------------------------------------------------
  zap_scan:
    name: ZAP – Dynamic Application Security Testing
    needs: build_image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start application container for ZAP scan
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          docker run -d --name zap_target -p 5000:5000 \
            ghcr.io/${{ github.repository_owner }}/task-manager-using-flask:latest

      - name: Wait for application to be ready
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          for i in {1..30}; do
            nc -z localhost 5000 && break || sleep 2
          done

      - name: Run OWASP ZAP baseline scan
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: zaproxy/action-baseline@v0.9.0
        with:
          target: http://localhost:5000
          fail_action: false

      - name: Upload ZAP report (if generated)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-report.html

      - name: Stop application container
        if: always()
        run: |
          docker rm -f zap_target

  # ---------------------------------------------------------------------
  # 6️⃣ Deploy‑review – ambiente temporário para revisão manual – depende do ZAP
  # ---------------------------------------------------------------------
  deploy_review:
    name: Deploy‑Review
    needs: zap_scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy review environment (temporary container)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          docker run -d --name review_app -p 8080:5000 \
            ghcr.io/${{ github.repository_owner }}/task-manager-using-flask:latest

      - name: Request manual approval (placeholder)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: hmarr/auto-approve-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Stop review environment container
        if: always()
        run: |
          docker rm -f review_app
