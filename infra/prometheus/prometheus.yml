global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  - job_name: 'task-manager-flask'
    static_configs:
      # Use the container name defined in the application compose file.
      # Both compose files share the external network "tasknet", so the
      # service can be reached by its name from the Prometheus container.
      - targets: ['task_manager_flask:5000']

  - job_name: 'infra-monitoring'
    static_configs:
      - targets: ['loki:3100', 'promtail:9080', 'alertmanager:9093']